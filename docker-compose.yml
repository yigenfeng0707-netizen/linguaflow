version: '3.8'

services:
  # 前端应用
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - linguaflow-network

  # PostgreSQL 数据库（本地开发用）
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=linguaflow
      - POSTGRES_PASSWORD=linguaflow123
      - POSTGRES_DB=linguaflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - linguaflow-network

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - linguaflow-network

volumes:
  postgres_data:
  redis_data:

networks:
  linguaflow-network:
    driver: bridge
