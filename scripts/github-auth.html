<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaFlow - GitHub 授权</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 15px;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        .steps {
            margin: 30px 0;
        }
        .step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .step-number {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .step-content h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .step-content p {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            margin: 20px 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .token-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            margin: 15px 0;
            font-family: monospace;
        }
        .token-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .copy-btn {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background: #555;
        }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            color: #856404;
            font-size: 13px;
        }
        .warning strong {
            display: block;
            margin-bottom: 5px;
        }
        .success {
            display: none;
            background: #d4edda;
            border: 1px solid #28a745;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .success.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <h1>LinguaFlow</h1>
            <p class="subtitle">多语种在线教育平台 - GitHub 授权</p>
        </div>

        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <div class="step-content">
                    <h3>点击授权按钮</h3>
                    <p>跳转到 GitHub 授权页面，登录你的账号</p>
                </div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-content">
                    <h3>生成 Token</h3>
                    <p>选择有效期（建议 30 天），勾选 repo 权限，生成 Token</p>
                </div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-content">
                    <h3>复制 Token</h3>
                    <p>复制生成的 Token（以 ghp_ 开头），粘贴到下方</p>
                </div>
            </div>
        </div>

        <a href="https://github.com/settings/tokens/new?description=LinguaFlow%20Deploy&scopes=repo" 
           target="_blank" 
           class="btn">
            🔐 前往 GitHub 授权
        </a>

        <div style="margin-top: 20px;">
            <label style="color: #666; font-size: 14px; display: block; margin-bottom: 8px;">
                粘贴你的 Token（以 ghp_ 开头）：
            </label>
            <input type="text" 
                   class="token-input" 
                   id="tokenInput"
                   placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
                   autocomplete="off">
            <button class="copy-btn" onclick="copyCommand()">
                📋 复制推送命令
            </button>
        </div>

        <div class="success" id="successMsg">
            ✅ 命令已复制！请在终端中粘贴执行
        </div>

        <div class="warning">
            <strong>⚠️ 安全提醒</strong>
            Token 只显示一次，请妥善保存。不要分享给他人，不要提交到代码仓库。
        </div>
    </div>

    <script>
        function copyCommand() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                alert('请先粘贴你的 GitHub Token');
                return;
            }
            
            if (!token.startsWith('ghp_')) {
                alert('Token 格式不正确，应该以 ghp_ 开头');
                return;
            }
            
            const command = `cd /workspace/linguaflow && ./scripts/push-to-github.sh ${token}`;
            
            navigator.clipboard.writeText(command).then(() => {
                document.getElementById('successMsg').classList.add('show');
                setTimeout(() => {
                    document.getElementById('successMsg').classList.remove('show');
                }, 3000);
            }).catch(err => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = command;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                document.getElementById('successMsg').classList.add('show');
            });
        }

        // 自动检测粘贴
        document.getElementById('tokenInput').addEventListener('paste', function(e) {
            setTimeout(() => {
                const token = this.value.trim();
                if (token.startsWith('ghp_')) {
                    copyCommand();
                }
            }, 100);
        });
    </script>
</body>
</html>
